<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acompanhamento de Manutenção - Grupo Vamos</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- PapaParse para conversão automática de CSV -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body class="bg-gray-100 font-sans p-4 md:p-8">

  <div class="max-w-7xl mx-auto space-y-6">
    
    <!-- Cabeçalho -->
    <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center bg-white p-6 rounded-xl shadow-sm border border-gray-200 gap-4">
      <div>
        <h1 class="text-2xl font-bold text-gray-800">Painel de Manutenção de Veículos</h1>
        <p class="text-sm text-gray-500">Grupo Vamos • Atualização em Tempo Real</p>
      </div>
      <button onclick="carregarDados()" class="px-4 py-2 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 transition flex items-center gap-2 shadow-sm">
        🔄 Atualizar Dados
      </button>
    </header>

    <!-- Cards de Indicadores / KPIs -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
      <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
        <p class="text-sm text-gray-500 font-medium">Total de Veículos</p>
        <h3 id="kpiTotal" class="text-3xl font-bold text-gray-900 mt-2">0</h3>
      </div>
      <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
        <p class="text-sm text-gray-500 font-medium">Aguardando / Análise</p>
        <h3 id="kpiAguardando" class="text-3xl font-bold text-amber-600 mt-2">0</h3>
      </div>
      <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
        <p class="text-sm text-gray-500 font-medium">Em Execução / Manutenção</p>
        <h3 id="kpiExecucao" class="text-3xl font-bold text-emerald-600 mt-2">0</h3>
      </div>
    </div>

    <!-- Tabela de Veículos -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <!-- Barra de Pesquisa e Título -->
      <div class="p-6 border-b border-gray-200 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <h2 class="text-lg font-semibold text-gray-800">Lista de Manutenções</h2>
        <input 
          type="text" 
          id="inputBusca" 
          onkeyup="filtrarTabela()" 
          placeholder="🔍 Buscar por placa ou cliente..." 
          class="w-full sm:w-72 px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
      </div>

      <!-- Tabela Scrollável -->
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-gray-50 text-gray-600 text-xs uppercase tracking-wider border-b border-gray-200">
              <th class="p-4">Placa</th>
              <th class="p-4">Cliente</th>
              <th class="p-4">Chassi</th>
              <th class="p-4">Status</th>
            </tr>
          </thead>
          <tbody id="tabelaCorpo" class="divide-y divide-gray-200 text-sm">
            <tr>
              <td colspan="4" class="p-6 text-center text-gray-500">
                Carregando dados da sua planilha do Google...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    // Link direto da sua planilha pública do Google
    const URL_PLANILHA_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vStnBao7OMUZCWPFCIzAJW3j3992eRaQKv4VK0ORlff2GGpnSkZ-iKG8fw2DvSrCxbkspWTAlL3A44Q/pub?output=csv';

    let dadosCompletos = [];

    function carregarDados() {
      Papa.parse(URL_PLANILHA_CSV, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
          dadosCompletos = results.data;
          renderizarPainel(dadosCompletos);
        },
        error: function(err) {
          console.error("Erro ao carregar a planilha:", err);
          document.getElementById('tabelaCorpo').innerHTML = `
            <tr>
              <td colspan="4" class="p-6 text-center text-red-500">
                Erro ao carregar dados. Verifique o link da planilha ou sua conexão.
              </td>
            </tr>`;
        }
      });
    }

    // Busca o valor da chave independentemente de letras maiúsculas/minúsculas
    function obterValorColuna(objeto, nomesPossiveis) {
      const chaves = Object.keys(objeto);
      for (const nome of nomesPossiveis) {
        const chaveEncontrada = chaves.find(k => k.trim().toLowerCase() === nome.toLowerCase());
        if (chaveEncontrada && objeto[chaveEncontrada]) {
          return objeto[chaveEncontrada];
        }
      }
      return '-';
    }

    function renderizarPainel(dados) {
      // 1. Calcular KPIs
      document.getElementById('kpiTotal').innerText = dados.length;

      const aguardandoCount = dados.filter(d => {
        const status = (obterValorColuna(d, ['status', 'situacao', 'fase'])).toLowerCase();
        return status.includes('aguardando') || status.includes('analise') || status.includes('aprova');
      }).length;

      const execucaoCount = dados.filter(d => {
        const status = (obterValorColuna(d, ['status', 'situacao', 'fase'])).toLowerCase();
        return status.includes('execucao') || status.includes('andamento') || status.includes('manutencao');
      }).length;

      document.getElementById('kpiAguardando').innerText = aguardandoCount;
      document.getElementById('kpiExecucao').innerText = execucaoCount;

      // 2. Preencher a Tabela
      const tbody = document.getElementById('tabelaCorpo');
      tbody.innerHTML = '';

      if (dados.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="p-6 text-center text-gray-500">Nenhum registro encontrado.</td></tr>';
        return;
      }

      dados.forEach(item => {
        const placa = obterValorColuna(item, ['placa', 'veiculo']);
        const cliente = obterValorColuna(item, ['cliente', 'nome cliente', 'empresa']);
        const chassi = obterValorColuna(item, ['chassi', 'chassis', 'num chassi']);
        const status = obterValorColuna(item, ['status', 'situacao', 'fase', 'status manutencao']);

        const tr = document.createElement('tr');
        tr.className = 'hover:bg-gray-50 transition';
        tr.innerHTML = `
          <td class="p-4 font-bold text-gray-900">${placa}</td>
          <td class="p-4 text-gray-700">${cliente}</td>
          <td class="p-4 text-gray-500 font-mono text-xs">${chassi}</td>
          <td class="p-4">
            <span class="px-2.5 py-1 text-xs font-semibold rounded-full bg-blue-100 text-blue-800">
              ${status}
            </span>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function filtrarTabela() {
      const termo = document.getElementById('inputBusca').value.toLowerCase();
      const dadosFiltrados = dadosCompletos.filter(item => {
        const placa = (obterValorColuna(item, ['placa', 'veiculo'])).toLowerCase();
        const cliente = (obterValorColuna(item, ['cliente', 'nome cliente', 'empresa'])).toLowerCase();
        return placa.includes(termo) || cliente.includes(termo);
      });
      renderizarPainel(dadosFiltrados);
    }

    // Inicia a busca ao carregar a página
    window.onload = carregarDados;
  </script>
</body>
</html>
