<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Manutenção em Tempo Real</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PapaParse CDN para ler CSV online -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Cabeçalho -->
    <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-2xl font-bold">Painel de Manutenção - Google Sheets Live</h1>
        <div class="flex items-center space-x-4">
            <span id="status-carregamento" class="text-sm bg-blue-700 px-3 py-1 rounded-full">Carregando dados...</span>
            <button onclick="carregarDadosPlanilha()" class="bg-white text-blue-600 font-semibold px-4 py-2 rounded shadow hover:bg-gray-100 transition">
                🔄 Atualizar Agora
            </button>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="container mx-auto p-6 space-y-6">

        <!-- Métricas Principais (Cards) -->
        <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-lg shadow-md border-l-4 border-blue-500">
                <h3 class="text-gray-500 text-sm font-bold uppercase">Total de Registros</h3>
                <p id="card-total" class="text-3xl font-extrabold text-gray-800 mt-2">0</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-md border-l-4 border-green-500">
                <h3 class="text-gray-500 text-sm font-bold uppercase">Categorias Diferentes</h3>
                <p id="card-categorias" class="text-3xl font-extrabold text-gray-800 mt-2">0</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-md border-l-4 border-purple-500">
                <h3 class="text-gray-500 text-sm font-bold uppercase">Última Sincronização</h3>
                <p id="card-ultima-atualizacao" class="text-lg font-bold text-gray-800 mt-3">--:--:--</p>
            </div>
        </section>

        <!-- Área dos Gráficos -->
        <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-lg font-bold mb-4 text-gray-700">Distribuição por Coluna Principais</h2>
                <canvas id="graficoBarras"></canvas>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-lg font-bold mb-4 text-gray-700">Proporção dos Dados</h2>
                <canvas id="graficoRosca"></canvas>
            </div>
        </section>

        <!-- Tabela de Dados Exibindo as Linhas da Planilha -->
        <section class="bg-white p-6 rounded-lg shadow-md overflow-x-auto">
            <h2 class="text-lg font-bold mb-4 text-gray-700">Dados da Planilha (Em Tempo Real)</h2>
            <table class="min-w-full border-collapse block md:table">
                <thead class="block md:table-header-group">
                    <tr id="tabela-cabecalho" class="border border-gray-300 md:border-none block md:table-row bg-gray-50 text-gray-600">
                        <!-- Cabeçalho dinâmico via JS -->
                    </tr>
                </thead>
                <tbody id="tabela-corpo" class="block md:table-row-group text-sm">
                    <!-- Linhas dinâmicas via JS -->
                </tbody>
            </table>
        </section>

    </main>

    <script>
        // URL da sua planilha publicada no Google Sheets como CSV
        const URL_PLANILHA = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vStnBao7OMUZCWPFCIzAJW3j3992eRaQKv4VK0ORlff2GGpnSkZ-iKG8fw2DvSrCxbkspWTAlL3A44Q/pub?output=csv';

        let chartBarras = null;
        let chartRosca = null;

        // Função principal para consumir a planilha online
        async function carregarDadosPlanilha() {
            const statusEl = document.getElementById('status-carregamento');
            statusEl.innerText = 'Sincronizando...';
            statusEl.className = 'text-sm bg-yellow-600 px-3 py-1 rounded-full text-white';

            try {
                // Adiciona um timestamp na URL para EVITAR cache do navegador
                const response = await fetch(`${URL_PLANILHA}&_t=${new Date().getTime()}`);
                const csvData = await response.text();

                // Converte o CSV para Objeto JSON
                Papa.parse(csvData, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        const dados = results.data;
                        const colunas = results.meta.fields;

                        atualizarInterface(dados, colunas);

                        statusEl.innerText = '● Ao Vivo';
                        statusEl.className = 'text-sm bg-green-600 px-3 py-1 rounded-full text-white';
                        document.getElementById('card-ultima-atualizacao').innerText = new Date().toLocaleTimeString();
                    }
                });

            } catch (error) {
                console.error('Erro ao buscar dados:', error);
                statusEl.innerText = 'Erro ao carregar';
                statusEl.className = 'text-sm bg-red-600 px-3 py-1 rounded-full text-white';
            }
        }

        // Função para montar tabelas e gráficos
        function atualizarInterface(dados, colunas) {
            if (!dados || dados.length === 0) return;

            // 1. Atualizar Cards
            document.getElementById('card-total').innerText = dados.length;
            
            // Primeira coluna usada como agrupador genérico para os gráficos
            const primeiraColuna = colunas[0];
            const contagemCategorias = {};

            dados.forEach(row => {
                const valor = row[primeiraColuna] || 'N/A';
                contagemCategorias[valor] = (contagemCategorias[valor] || 0) + 1;
            });

            const labels = Object.keys(contagemCategorias);
            const valores = Object.values(contagemCategorias);

            document.getElementById('card-categorias').innerText = labels.length;

            // 2. Renderizar Tabela
            const thead = document.getElementById('tabela-cabecalho');
            thead.innerHTML = colunas.map(col => `<th class="p-3 font-semibold text-left border-b">${col}</th>`).join('');

            const tbody = document.getElementById('tabela-corpo');
            tbody.innerHTML = dados.map(row => {
                const celulas = colunas.map(col => `<td class="p-3 border-b border-gray-200">${row[col] || ''}</td>`).join('');
                return `<tr class="hover:bg-gray-50">${celulas}</tr>`;
            }).join('');

            // 3. Renderizar / Atualizar Gráficos
            renderizarGraficos(labels, valores);
        }

        function renderizarGraficos(labels, valores) {
            // Destruir gráficos anteriores para recalcular
            if (chartBarras) chartBarras.destroy();
            if (chartRosca) chartRosca.destroy();

            const ctxBarras = document.getElementById('graficoBarras').getContext('2d');
            chartBarras = new Chart(ctxBarras, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Quantidade',
                        data: valores,
                        backgroundColor: '#3B82F6'
                    }]
                },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });

            const ctxRosca = document.getElementById('graficoRosca').getContext('2d');
            chartRosca = new Chart(ctxRosca, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: valores,
                        backgroundColor: ['#3B82F6', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6', '#EC4899']
                    }]
                },
                options: { responsive: true }
            });
        }

        // Executar busca ao carregar a página
        window.onload = () => {
            carregarDadosPlanilha();
            
            // Auto-sincronizar a cada 30 segundos em tempo real
            setInterval(carregarDadosPlanilha, 30000);
        };
    </script>
</body>
</html>
